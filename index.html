<!DOCTYPE html>

<html>
<head>
<title>ASHER</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
    background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 40%),
        linear-gradient(135deg, #03152d, #0b2d5c, #123f7d);
    color:white;
    font-family:'Poppins', sans-serif;
    text-align:center;
    margin-top:12%;
    min-height:100vh;
}

h1{
    font-family:'Cinzel', serif;
    font-size:70px;
    letter-spacing:5px;
    color:#f8f9fa;
    text-shadow:0 0 15px rgba(255,255,255,0.15);
}

.quote{
    font-style:italic;
    font-size:22px;
    color:#d6d6d6;
    margin:25px auto;
    max-width:800px;
    line-height:1.8;
}

.question{
    font-size:22px;
    color:#ffffff;
    margin-top:35px;
}

input{
    margin-top:20px;
    padding:12px 18px;
    width:280px;
    border:none;
    border-radius:8px;
    font-size:18px;
    text-align:center;
    background:rgba(255,255,255,0.95);
}

button{
    margin-top:30px;
    padding:15px 40px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#1e4d8f;
    color:white;
    transition:0.3s;
}

button:hover{
    background:#2c6bc0;
    transform:translateY(-2px);
}
</style>

</head>

<body>

<h1>MISSIONN to ASHER</h1>

<p class="quote">
"IGNOSCE MIHI.... PRO AMORE MEO IMPERFECTO — QUOD TE AMORE MEO CORRUPI."
</p>

<p class="question">
We have a scandal, I'd Fitzgerald...you?
</p>

<input type="text" id="answer">

<br>

<button onclick="checkAnswer()">Continue</button>

<script>
function checkAnswer() {
    let answer = document.getElementById("answer").value.trim().toLowerCase();

    if (
        answer === "olivia" ||
        answer === "olivia pope" ||
        answer === "pope"
    ) {
        window.location.href = "https://YOUR-STAGE-2-LINK";
    } else {
        alert("Incorrect. Try again.");
    }
}
</script>

</body>
</html>
