<!DOCTYPE html>

<html>
<head>
<title>ASHER</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 40%),
        linear-gradient(135deg, #03152d, #0b2d5c, #123f7d);
    color:white;
    font-family:'Poppins', sans-serif;
    text-align:center;
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    font-family:'Cinzel', serif;
    font-size:70px;
    letter-spacing:5px;
    color:#f8f9fa;
    text-shadow:0 0 15px rgba(255,255,255,0.15);
    margin-bottom:20px;
}

.quote{
    font-style:italic;
    font-size:16px;
    color:#cfd8dc;
    white-space:nowrap;
    letter-spacing:1px;
    margin-bottom:50px;
}

.question{
    font-size:42px;
    font-weight:700;
    color:#ffe082;
    text-shadow:
        0 0 15px rgba(255,224,130,0.5),
        0 0 30px rgba(255,224,130,0.25);
    margin-bottom:30px;
}

input{
    padding:14px 20px;
    width:300px;
    border:none;
    border-radius:8px;
    font-size:18px;
    text-align:center;
    background:rgba(255,255,255,0.95);
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

button{
    margin-top:25px;
    padding:15px 40px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#1e4d8f;
    color:white;
    transition:0.3s ease;
}

button:hover{
    background:#2c6bc0;
    transform:translateY(-2px);
}

button:active{
    transform:translateY(0);
}
</style>

</head>

<body>

<h1>MISSIONN'S MESSAGE FOR ASHER</h1>

<p class="quote">
"IGNOSCE MIHI.... PRO AMORE MEO IMPERFECTO — QUOD TE AMORE MEO CORRUPI."
</p>

<p class="quote">
Phase 1
 </p>
    
<p class="question">
We have a scandal, I'd Fitzgerald...you?
</p>

<input type="text" id="answer">

<button onclick="checkAnswer()">Continue</button>

<script>
function checkAnswer() {
    let answer = document.getElementById("answer").value.trim().toLowerCase();

    if (
        answer === "olivia" ||
        answer === "olivia pope" ||
        answer === "pope"
    ) {
        window.location.href = "https://youtu.be/caAN0eBCIMc";
    } else {
        alert("Incorrect. Try again.");
    }
}
</script>

</body>
</html>
